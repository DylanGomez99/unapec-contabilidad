services:
  db-contabilidad:
    image: postgres:16-alpine
    container_name: postgres-contabilidad
    restart: unless-stopped
    environment:
      - POSTGRES_USER=USER_DB
      - POSTGRES_PASSWORD=2026DB
      - POSTGRES_DB=contabilidad_db
    ports:
      - "5434:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U USER_DB -d contabilidad_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - accounting-net

  backend:
    build:
      context: ../backend-contabilidad
      dockerfile: Dockerfile
    container_name: backend-unapec
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db-contabilidad
      - DB_PORT=5432
      - DB_NAME=contabilidad_db
      - DB_USER=USER_DB
      - DB_PASS=2026DB
    depends_on:
      db-contabilidad:
        condition: service_healthy
    networks:
      - accounting-net

  frontend:
    build:
      context: ../frontend-contabilidad
      dockerfile: Dockerfile
    container_name: frontend-unapec
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    depends_on:
      - backend
    networks:
      - accounting-net

networks:
  accounting-net:
    driver: bridge
